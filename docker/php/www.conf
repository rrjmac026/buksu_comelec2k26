; Force PHP-FPM to stay in the foreground so Docker does not treat it as exited
[global]
daemonize = no
error_log = /proc/self/fd/2

; Ensure PHP-FPM accepts FastCGI from the nginx container (not only localhost)
[www]
listen = 0.0.0.0:9000
clear_env = no
pm = dynamic
pm.max_children = 10
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 5
access.log = /proc/self/fd/2
