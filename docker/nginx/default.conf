# Laravel + PHP-FPM (app container on port 9000)
# Storage files are served directly from the named volume via /storage/ alias.

gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css text/xml text/javascript
           application/json application/javascript application/xml+rss
           application/atom+xml image/svg+xml font/woff2;

server {
    listen 80;
    listen [::]:80;
    server_name comelec.buksu.edu.ph 203.177.114.167 10.1.0.10 _;

    root /var/www/html/public;
    index index.php;
    charset utf-8;

    # Security headers
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # Allow large uploads (candidate photos, CSV imports, backups)
    client_max_body_size 128M;
    client_body_timeout  120s;

    # ---------------------------------------------------------------------------
    # User-uploaded / storage files — served directly from the named volume.
    # The volume is mounted at /var/www/html/storage inside the nginx container.
    # This avoids routing file downloads through PHP-FPM.
    # ---------------------------------------------------------------------------
    location /storage/ {
        alias /var/www/html/storage/app/public/;
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Vite/compiled assets — long-lived cache (filenames contain content hash)
    location /build/ {
        try_files $uri =404;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Standard Laravel try_files
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # PHP via FastCGI to the `app` service
    location ~ \.php$ {
        fastcgi_pass   app:9000;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_buffers      16 16k;
        fastcgi_buffer_size  32k;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;

        # Pass real client IP when behind a reverse proxy / load balancer
        fastcgi_param  HTTP_X_REAL_IP      $remote_addr;
        fastcgi_param  HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
    }

    # Block hidden files (except Let's Encrypt challenges)
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
