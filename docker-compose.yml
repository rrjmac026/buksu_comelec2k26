# buksu_comelec2k26 — Laravel 12 + Vite (PHP-FPM, Nginx, MySQL, Redis)
#
# First-time (Ubuntu server):
#   cp .env.example .env
#   # edit .env: APP_KEY, APP_URL, DB_*, DB_ROOT_PASSWORD, SESSION_*, etc.
#   docker compose build
#   docker compose up -d
#   docker compose exec app php artisan migrate --force
#
# Optional: run the queue worker profile
#   docker compose --profile queue up -d
#
name: buksu_comelec2k26

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: buksu_comelec2k26-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_HOST: mysql
      DB_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal
    expose:
      - "9000"

  nginx:
    build:
      context: .
      dockerfile: Dockerfile
      target: nginx
    image: buksu_comelec2k26-nginx:latest
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - app
    networks:
      - internal

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-comelec2k26}
      MYSQL_USER: ${DB_USERNAME:-comelec}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mysqladmin ping -h 127.0.0.1 -uroot -p"$$MYSQL_ROOT_PASSWORD" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 40s
    networks:
      - internal
    expose:
      - "3306"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    expose:
      - "6379"

  queue:
    profiles:
      - queue
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: buksu_comelec2k26-app:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_HOST: mysql
      DB_PORT: "3306"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
      redis:
        condition: service_started
    command:
      [
        "php",
        "artisan",
        "queue:work",
        "--sleep=3",
        "--tries=3",
        "--max-time=3600",
        "--no-interaction",
      ]
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  app_storage:
  app_bootstrap_cache:
